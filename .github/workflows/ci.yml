name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches-ignore:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Install · Vet · Test · Build
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: app/go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        env:
          CGO_ENABLED: "1"
        run: go vet ./...

      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test -v -count=1 ./...

      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -v ./...
